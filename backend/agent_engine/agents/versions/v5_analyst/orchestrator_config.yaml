version: "0.5.0"
name: "v5_analyst"
description: "Comprehensive investment research assistant combining all capabilities"

tools:
  - yfinance_stock_quote
  - yfinance_get_available_fields
  - tavily_financial_search
  - sec_filing_list_sections
  - sec_filing_get_section
  - duckdb_query
  - text_to_sql
  - neo4j_query
  - text_to_cypher

model:
  name: "google_genai:gemini-2.5-flash"
  temperature: 0.0
  reasoning: "on"
  thinking_budget: null

constraints:
  max_tool_calls_per_run: 15
