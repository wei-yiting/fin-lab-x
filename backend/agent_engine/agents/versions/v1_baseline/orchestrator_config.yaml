version: "0.1.0"
name: "v1_baseline"
description: "Naive single-chain financial analysis with basic tool access"

tools:
  - yfinance_stock_quote
  - yfinance_get_available_fields
  - tavily_financial_search
  - sec_filing_list_sections
  - sec_filing_get_section

model:
  name: "google_genai:gemini-2.5-flash"
  temperature: 0.0
  reasoning: "on"
  # Explicit cap (was: null = model default = unlimited). Unlimited let
  # Gemini 2.5 Flash overthink simple tool-decision turns, increasing
  # latency 1.5-3× and reducing tool-arg consistency. 1024 covers
  # multi-step reasoning while keeping the budget tight.
  thinking_budget: 1024

constraints:
  max_tool_calls_per_run: 10
