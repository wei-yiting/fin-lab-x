name: sec_retrieval
csv: dataset.csv
task:
  function: backend.evals.eval_tasks.run_sec_retrieval
column_mapping:
  question: input.question
  expected_header_paths: expected.header_paths
  expected_tickers: expected.tickers
  match_mode: expected.match_mode
  answer_snippets: expected.answer_snippets
  query_type: metadata.query_type
scorers:
  - name: header_path_recall_at_5
    function: backend.evals.scorers.sec_retrieval_scorer.header_path_recall_at_5
  - name: header_path_recall_at_10
    function: backend.evals.scorers.sec_retrieval_scorer.header_path_recall_at_10
  - name: mrr
    function: backend.evals.scorers.sec_retrieval_scorer.mean_reciprocal_rank
  - name: map
    function: backend.evals.scorers.sec_retrieval_scorer.mean_average_precision
